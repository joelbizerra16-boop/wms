{% extends 'base.html' %}

{% block title %}Editar usuário | WMS{% endblock %}

{% block content %}
<div class="card section">
    <div class="actions-row" style="justify-content: space-between;">
        <h1 style="margin: 0;">Editar usuário</h1>
        <a href="{% url 'web-usuarios' %}" class="btn btn-light">Voltar</a>
    </div>
</div>

<div class="card section">
    <form method="post">
        {% csrf_token %}
        <div class="user-form-grid">
            <div class="user-form-col">
                <div class="user-form-field">
                    <label for="nome">Nome</label>
                    <input id="nome" name="nome" type="text" value="{{ alvo.nome }}" required>
                </div>
                <div class="user-form-field">
                    <label for="username">Username</label>
                    <input id="username" name="username" type="text" value="{{ alvo.username }}" required>
                </div>
                <div class="user-form-field">
                    <label for="senha">Senha (opcional)</label>
                    <input id="senha" name="senha" type="password" placeholder="Deixe em branco para manter">
                </div>
            </div>
            <div class="user-form-col">
                <div class="user-form-field">
                    <label for="perfil">Perfil</label>
                    <select id="perfil" name="perfil">
                        {% for valor, label in perfis %}
                        <option value="{{ valor }}" {% if alvo.perfil == valor %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="user-form-field">
                    <label>Setores</label>
                    <div class="setores-container">
                        {% for setor in setores %}
                        <label class="setor-item">
                            <input type="checkbox" name="setores" value="{{ setor.nome }}" {% if setor.nome in setores_usuario %}checked{% endif %}>
                            <span>{{ setor.nome }}</span>
                        </label>
                        {% endfor %}
                    </div>
                </div>
                <div class="user-form-checkboxes">
                    <label class="user-checkbox-row"><input name="is_active" type="checkbox" {% if alvo.is_active %}checked{% endif %}> <span>Usuário ativo</span></label>
                    <label class="user-checkbox-row"><input name="is_staff" type="checkbox" {% if alvo.is_staff %}checked{% endif %}> <span>Usuário staff</span></label>
                </div>
            </div>
        </div>
        <div class="actions-row" style="margin-top: 16px;">
            <button type="submit" class="btn-primary">Salvar alterações</button>
        </div>
    </form>
</div>

<style>
.setores-container { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; width: 100%; }
.setor-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 8px; border: 1px solid #e2e8f0; transition: all .2s ease; cursor: pointer; }
.setor-item:hover { background: #f3f6fb; }
.setor-item input[type="checkbox"] { width: 16px; height: 16px; margin: 0; cursor: pointer; }
.setor-item span { font-size: 14px; font-weight: 500; color: #1e293b; }
.setor-item input:checked + span { color: #2563eb; font-weight: 600; }
.setor-item:has(input:checked) { background: #eff6ff; border-color: #2563eb; }
</style>
{% endblock %}
