{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}WMS{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/app.css' %}">
</head>
<body class="{% if acesso.is_operacional %}sidebar-operacional{% endif %}">
    <header class="site-header" id="sidebar">
        {% include 'components/sidebar.html' %}
    </header>
    <main class="app-main {% block container_class %}container{% endblock %}">
        {% if messages %}
        <ul class="messages">
            {% for message in messages %}
            <li class="{{ message.tags }}">{{ message }}</li>
            {% endfor %}
        </ul>
        {% endif %}

        <div class="page-stack">
            {% block content %}{% endblock %}
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
    if (window.lucide) {
        window.lucide.createIcons();
    }
    (function () {
        const body = document.body;
        const sidebar = document.getElementById('sidebar');
        const isOperacional = body.classList.contains('sidebar-operacional');
        const menuLinks = document.querySelectorAll('.site-nav a');
        const submenuButtons = document.querySelectorAll('[data-submenu-toggle]');
        menuLinks.forEach(function (link) {
            link.classList.add('menu-link');
        });
        submenuButtons.forEach(function (submenuButton) {
            submenuButton.addEventListener('click', function () {
                const group = submenuButton.closest('.nav-group');
                if (!group) return;
                const willOpen = !group.classList.contains('nav-group--open');
                group.classList.toggle('nav-group--open', willOpen);
                submenuButton.setAttribute('aria-expanded', willOpen ? 'true' : 'false');
            });
        });
        const key = 'wms-sidebar-collapsed';
        if (isOperacional) {
            body.classList.remove('sidebar-collapsed');
            window.localStorage.setItem(key, '0');
            window.localStorage.setItem('sidebar', 'open');
            return;
        }
        const btn = document.getElementById('toggleMenu');
        if (!btn) return;
        if (window.innerWidth > 768) {
            const persisted = window.localStorage.getItem(key);
            if (persisted === '1' || persisted === 'collapsed') {
                body.classList.add('sidebar-collapsed');
            }
            btn.setAttribute('aria-expanded', body.classList.contains('sidebar-collapsed') ? 'false' : 'true');
        }
        btn.addEventListener('click', function () {
            if (window.innerWidth <= 768) {
                body.classList.toggle('mobile-menu-open');
                btn.setAttribute('aria-expanded', body.classList.contains('mobile-menu-open') ? 'true' : 'false');
                return;
            }
            body.classList.toggle('sidebar-collapsed');
            const collapsed = body.classList.contains('sidebar-collapsed');
            window.localStorage.setItem(key, collapsed ? '1' : '0');
            window.localStorage.setItem('sidebar', collapsed ? 'collapsed' : 'open');
            btn.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
        });
        document.querySelectorAll('.menu-link').forEach(function (link) {
            link.addEventListener('click', function () {
                if (window.innerWidth <= 768) {
                    body.classList.remove('mobile-menu-open');
                    return;
                }
                if (!sidebar) return;
                if (body.classList.contains('sidebar-collapsed')) {
                    body.classList.remove('sidebar-collapsed');
                    window.localStorage.setItem(key, '0');
                    window.localStorage.setItem('sidebar', 'open');
                }
            });
        });
        document.addEventListener('click', function (event) {
            if (window.innerWidth > 768 || !body.classList.contains('mobile-menu-open')) return;
            if (!sidebar || sidebar.contains(event.target) || event.target === btn) return;
            body.classList.remove('mobile-menu-open');
        });
        window.addEventListener('resize', function () {
            if (window.innerWidth > 768) {
                body.classList.remove('mobile-menu-open');
                btn.setAttribute('aria-expanded', body.classList.contains('sidebar-collapsed') ? 'false' : 'true');
                return;
            }
            btn.setAttribute('aria-expanded', body.classList.contains('mobile-menu-open') ? 'true' : 'false');
        });
        document.addEventListener('keydown', function (event) {
            if (event.key === 'Escape' && window.innerWidth <= 768) {
                body.classList.remove('mobile-menu-open');
                btn.setAttribute('aria-expanded', 'false');
            }
        });
    })();
    </script>
</body>
</html>
