services:
  - type: web
    name: wms
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    preDeployCommand: python manage.py create_render_superuser
    startCommand: python manage.py migrate --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --worker-class gthread --workers 4 --threads 8 --timeout 120 --keep-alive 5
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://*.onrender.com
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: DJANGO_SUPERUSER_USERNAME
        value: admin
      - key: DJANGO_SUPERUSER_EMAIL
        value: admin@wms.com
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
      - key: LOG_LEVEL
        value: INFO
      - key: WEB_CONCURRENCY
        value: 4
      - key: GUNICORN_THREADS
        value: 8
      - key: GUNICORN_TIMEOUT
        value: 120
      - key: DB_CONN_MAX_AGE
        value: 300
      - key: CACHE_DEFAULT_TIMEOUT
        value: 20
      - key: REQUEST_SLOW_LOG_MS
        value: 300
      - key: REQUEST_CRITICAL_LOG_MS
        value: 800
      - key: BIPAGEM_SLOW_LOG_MS
        value: 150
      - key: DATA_UPLOAD_MAX_NUMBER_FILES
        value: 1000
      - key: DATA_UPLOAD_MAX_MEMORY_SIZE
        value: 52428800
      - key: FILE_UPLOAD_MAX_MEMORY_SIZE
        value: 52428800